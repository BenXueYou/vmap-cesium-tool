<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vmap-cesium-tool - autoRecover 最小示例</title>

  <!-- 该示例使用 CDN Cesium（保证全局 Cesium/Widgets 样式可用） -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />

  <style>
    html, body, #cesiumContainer {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #toast {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 2000;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font: 12px/1.4 Arial, sans-serif;
      padding: 8px 10px;
      border-radius: 6px;
      max-width: 420px;
      display: none;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="toast"></div>

  <script type="module">
    import {
      initCesium,
      CesiumMapToolbar,
      CesiumOverlayService,
      HeatmapLayer,
    } from '../dist/index.js';

    const containerId = 'cesiumContainer';
    const container = document.getElementById(containerId);
    const toast = document.getElementById('toast');

    let viewer = null;
    let toolbar = null;
    let overlay = null;
    let heatmap = null;

    function showToast(text, ms = 2500) {
      toast.textContent = String(text || '');
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, ms);
    }

    /**
     * 最小“重绑”函数：所有依赖 viewer 的对象都必须在这里重建。
     * 注意：autoRecover 会产生新的 viewer 实例，旧 viewer 上的对象必须销毁。
     */
    function bindAll(v) {
      viewer = v;

      // 1) Toolbar
      try { toolbar?.destroy?.(); } catch { /* ignore */ }
      toolbar = new CesiumMapToolbar(viewer, container);

      // 2) Overlay
      try { overlay?.destroy?.(); } catch { /* ignore */ }
      overlay = new CesiumOverlayService(viewer);
      overlay.addMarker({
        id: 'm1',
        position: [116.3974, 39.9093],
        pixelSize: 10,
      });

      // 3) Heatmap
      try { heatmap?.destroy?.(); } catch { /* ignore */ }
      heatmap = new HeatmapLayer(viewer, { width: 512, height: 512 });
      heatmap.setData([
        { lon: 116.39, lat: 39.90, value: 10 },
        { lon: 116.40, lat: 39.91, value: 25 },
        { lon: 116.41, lat: 39.90, value: 45 },
        { lon: 116.42, lat: 39.92, value: 15 },
      ]);
      heatmap.setAutoUpdate({ enabled: true });

      showToast('bindAll: toolbar/overlay/heatmap 已绑定到当前 viewer');
    }

    async function boot() {
      // 说明：Cesium Ion token 主要用于 world terrain 等资源；
      // 这个示例只演示 autoRecover 机制，你可以先不填或填自己的 token。
      const { viewer: v } = await initCesium(containerId, {
        cesiumToken: 'your_cesium_ion_token',
        autoRecover: {
          enabled: true,
          maxRetries: 3,
          cooldownMs: 5000,
          preserveCamera: true,
          onRecovering: ({ reason, attempt }) => {
            showToast(`[autoRecover] recovering...\nreason=${reason}\nattempt=${attempt}`, 3000);
          },
          onRecovered: ({ newViewer, reason, attempt }) => {
            showToast(`[autoRecover] recovered\nreason=${reason}\nattempt=${attempt}`, 3000);
            bindAll(newViewer);
          },
        },
      });

      bindAll(v);

      // 额外：方便手动验证恢复流程（控制台执行 window.__forceCrash()）
      window.__forceCrash = () => {
        // 通过抛出一个带关键词的 error，让 autoRecover 的 window error 兜底触发（仅用于演示）
        throw new Error('Rendering has stopped (demo)');
      };
      console.log('demo-auto-recover ready. You can run window.__forceCrash() in console.');
    }

    boot().catch((e) => {
      console.error('boot failed', e);
      showToast('boot failed: ' + (e?.message || e));
    });

    window.addEventListener('beforeunload', () => {
      try { toolbar?.destroy?.(); } catch { /* ignore */ }
      try { overlay?.destroy?.(); } catch { /* ignore */ }
      try { heatmap?.destroy?.(); } catch { /* ignore */ }
      try { viewer?.destroy?.(); } catch { /* ignore */ }
    });
  </script>
</body>
</html>
