# Default server configuration
#
server {
	#listen 8080  default_server;
	listen 8080  ssl default_server;
	ssl_certificate     /home/workserver/work-local/nginx/ssl/192.168.1.150.crt;
	ssl_certificate_key /home/workserver/work-local/nginx/ssl/192.168.1.150.key;
        client_max_body_size 1024m;

	root /var/www/html;

	# Add index.php to the list if you are using PHP
	index index.html index.htm index.nginx-debian.html;

	server_name _;

	    location /ws/ {
        proxy_pass http://192.168.1.150:49080;  # 后端WebSocket服务

        # WebSocket必要配置
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        # 连接超时设置
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;

        # 缓冲区设置
        proxy_buffers 8 32k;
        proxy_buffer_size 64k;

        # 安全头
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 跨域支持
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization";
    }

    location /video/ {
    proxy_pass http://192.168.1.150:8086/;

    # 恢复请求头传递（或选择性传递）
    proxy_pass_request_headers on;

    # 设置必要的代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 流媒体代理特殊配置
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

      # 添加超时设置（单位：秒）
    proxy_read_timeout 3600s;  # 读取后端响应超时，适用于长流
    proxy_send_timeout 3600s;  # 发送请求到后端超时
    proxy_connect_timeout 30s; # 连接后端超时

    }

	// cesium-map 组件文档
	location = /cesium-map {
  		return 301 /cesium-map/;
	}
	location ^~ /cesium-map/ {
  		alias   /var/www/html/cesium-map/;
 		index   index.html;
  		try_files $uri $uri/ /cesium-map/404.html;

  		location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    			expires 1y;
    			add_header Cache-Control "public, immutable";
  		}
	}

        location /vmicro-app-main/ {
            alias   /var/www/html/vmicro-app-main/;
            index   index.html;
            try_files $uri $uri/ /vmicro-app-main/index.html;
            
            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        location /vmicro-app-login/ {
            alias   /var/www/html/vmicro-app-login/;
            index   index.html;
            try_files $uri $uri/ /vmicro-app-login/index.html;
            
            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
        # 飞控中心子应用配置
        location /vmicro-app-fly-ctrl/ {
            alias   /var/www/html/vmicro-app-fly-ctrl/;
            index   index.html;
            try_files $uri $uri/ /vmicro-app-fly-ctrl/index.html;
            
            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

	#添加地图禁飞区域静态资源的配置
	location /geojson/ {
	    alias /var/www/html/map/geojson/;
	    # 允许跨域访问（部分浏览器加载 Worker 可能需要）
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            # 静态资源缓存
            expires 1y;
            add_header Cache-Control "public, immutable";
	}

	# 飞控配置子应用配置
        location /vmicro-app-fly-config/ {
            alias   /var/www/html/vmicro-app-fly-config/;
            index   index.html;
            try_files $uri $uri/ /vmicro-app-fly-config/index.html;
            
            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # 明确映射 Cesium 目录，确保 Workers/Widgets 等资源能通过 /vmicro-app-system-config/cesium/ 正确访问
        location /vmicro-app-system-config/cesium/ {
            alias /var/www/html/vmicro-app-system-config/cesium/;
            # 允许跨域访问（部分浏览器加载 Worker 可能需要）
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            # 静态资源缓存
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # 系统配置子应用配置
        location /vmicro-app-system-config/ {
            alias   /var/www/html/vmicro-app-system-config/;
            index   index.html;
            try_files $uri $uri/ /vmicro-app-system-config/index.html;
            
            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # 明确映射飞控中心子应用的 Cesium 目录
        location /vmicro-app-fly-ctrl/cesium/ {
            alias /var/www/html/vmicro-app-fly-ctrl/cesium/;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /admin-api/ {
            proxy_pass http://192.168.1.150:48080/admin-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 跨域配置
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

         location /minio/ {
            proxy_pass http://192.168.1.112:9000/;
            proxy_pass_request_headers off;
        }






	location / {
		# First attempt to serve request as file, then
		# as directory, then fall back to displaying a 404.
	#	try_files $uri $uri/ =404;
                return 301 /vmicro-app-main/;
	}

